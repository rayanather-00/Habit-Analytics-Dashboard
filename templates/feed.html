<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/feed.css') }}">
</head>

<body>

    <h1 class="title">🎬 Feed Tracker</h1>

    <!-- SIDEBAR BUTTON -->
    <div class="book_mark" onclick="toggleSidebar()">
        <img src="{{ url_for('static', filename='imagines/button bc.png') }}" alt="">
        <p class="pull">Menu</p>
    </div>

    <!-- SIDEBAR -->
    <div class="sub_header" id="sidebar">
        <ul>
            <li><a href="{{ url_for('home') }}">Dashboard</a></li>
            <li><a href="{{ url_for('statistics') }}">Statistics</a></li>
            <li><a href="{{ url_for('expenses') }}"> Expenses</a></li>
            <li><a href="{{ url_for('documents') }}">Documents</a></li>
            <li><a href="{{ url_for('saved_links') }}">Saved Links</a></li>
            <li><a href="{{ url_for('feed') }}"> Feed</a></li>
            <li><a href="{{ url_for('events') }}"> Events</a></li>
            <li><a href="{{ url_for('learning') }}"> Learning Hub</a></li>
            <li><a href="{{url_for('reviews')}}">Website Reviews</a></li>
            <li class="settings-item">
                <a href="settings.html" class="settings-btn">
                    ⚙️ Settings
                </a>
            </li>
        </ul>
    </div>

    <div id="overlay"></div>

    <!-- MAIN -->
    <div class="container">

        <!-- LEFT: INPUT -->
        <div class="add-box">

            <h2>➕ Add Entry</h2>

            <!-- TYPE -->
            <select id="type">
                <option value="watched">Watched</option>
                <option value="watchlist">To Watch</option>
            </select>

            <!-- TITLE -->
            <input type="text" id="title" placeholder="Title (Anime / Manhwa / Novel)">

            <!-- COVER IMAGE FILE -->
            <input type="file" id="coverFile" accept="image/*">

            <h3>⭐ Ratings (1–5)</h3>

            <input type="text" id="character" placeholder="Character (0-5)">
            <input type="text" id="pacing" placeholder="Pacing (0-5)">
            <input type="text" id="world" placeholder="World Building (0-5)">

            <button onclick="addEntry()">Add Entry</button>

        </div>

        <!-- RIGHT: DISPLAY -->
        <div class="feed-box">

            <h2>🏆 Top 3 Watched</h2>
            <div id="top3"></div>

            <h2>🎬 Watched</h2>
            <div id="watchedList"></div>

            <h2>📖 To Watch</h2>
            <div id="watchList"></div>

        </div>

    </div>

     <script src="{{ url_for('static', filename='js/feed.js') }}"></script>
</body>

</html>
